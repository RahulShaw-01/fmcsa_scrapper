<!DOCTYPE html>
<html>
<head>
    <title>Lucas Scraper</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <h2>🚛 Lucas Carrier Scraper</h2>
    <form method="POST">
        <div class="mb-3">
            <label>Enter Multiple MC Numbers (Comma or Space separated):</label>
            <textarea name="mcs" class="form-control" rows="5">{{ mc_raw if mc_raw else '' }}</textarea>
        </div>
        <button type="submit" class="btn btn-primary">Start Scraping</button>
        {% if results %}
        <button type="submit" name="download" class="btn btn-success">Download Excel</button>
        {% endif %}
    </form>

    {% if results %}
    <table class="table mt-4 table-striped">
        <thead>
            <tr>
                <th>MC</th>
                <th>Name</th>
                <th>Phone</th>
                <th>Physical Address</th>
            </tr>
        </thead>
        <tbody>
            {% for row in results %}
            <tr>
                <td>{{ row.MC }}</td>
                <td>{{ row.Name }}</td>
                <td>{{ row.Phone }}</td>
                <td>{{ row.Physical_Address }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    {% endif %}
</body>
</html>
